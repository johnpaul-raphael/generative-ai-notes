<svg width="700" height="280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="280" fill="#f8f9fa" rx="10"/>
  <text x="350" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">RNN Sequence Types</text>

  <!-- Many-to-Many -->
  <text x="90"  y="55" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">Many to Many</text>
  <text x="90"  y="68" text-anchor="middle" font-size="9"  fill="#8e44ad">(Seq to Seq)</text>
  <rect x="45"  y="80" width="28" height="28" rx="5" fill="#3498db"/><text x="59"  y="99" text-anchor="middle" font-size="10" fill="white">X1</text>
  <rect x="80"  y="80" width="28" height="28" rx="5" fill="#3498db"/><text x="94"  y="99" text-anchor="middle" font-size="10" fill="white">X2</text>
  <rect x="115" y="80" width="28" height="28" rx="5" fill="#3498db"/><text x="129" y="99" text-anchor="middle" font-size="10" fill="white">X3</text>
  <rect x="45"  y="125" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="80"  y="125" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="115" y="125" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="45"  y="170" width="28" height="28" rx="5" fill="#2ecc71"/><text x="59"  y="189" text-anchor="middle" font-size="10" fill="white">Y1</text>
  <rect x="80"  y="170" width="28" height="28" rx="5" fill="#2ecc71"/><text x="94"  y="189" text-anchor="middle" font-size="10" fill="white">Y2</text>
  <rect x="115" y="170" width="28" height="28" rx="5" fill="#2ecc71"/><text x="129" y="189" text-anchor="middle" font-size="10" fill="white">Y3</text>
  <line x1="45" y1="108" x2="45" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="80" y1="108" x2="80" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="115" y1="108" x2="115" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="45" y1="153" x2="45" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="80" y1="153" x2="80" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="115" y1="153" x2="115" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="75"  y1="139" x2="78"  y2="139" stroke="#e67e22" stroke-width="1.5" marker-end="url(#sqo)"/>
  <line x1="110" y1="139" x2="113" y2="139" stroke="#e67e22" stroke-width="1.5" marker-end="url(#sqo)"/>
  <text x="90" y="235" text-anchor="middle" font-size="9" fill="#555">Translation</text>

  <!-- Many-to-One -->
  <text x="250" y="55" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a085">Many to One</text>
  <text x="250" y="68" text-anchor="middle" font-size="9"  fill="#16a085">(Seq to Vec)</text>
  <rect x="205" y="80" width="28" height="28" rx="5" fill="#3498db"/><text x="219" y="99" text-anchor="middle" font-size="10" fill="white">X1</text>
  <rect x="240" y="80" width="28" height="28" rx="5" fill="#3498db"/><text x="254" y="99" text-anchor="middle" font-size="10" fill="white">X2</text>
  <rect x="275" y="80" width="28" height="28" rx="5" fill="#3498db"/><text x="289" y="99" text-anchor="middle" font-size="10" fill="white">X3</text>
  <rect x="205" y="125" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="240" y="125" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="275" y="125" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="240" y="170" width="28" height="28" rx="5" fill="#2ecc71"/><text x="254" y="189" text-anchor="middle" font-size="10" fill="white">Y</text>
  <line x1="205" y1="108" x2="205" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="240" y1="108" x2="240" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="275" y1="108" x2="275" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="275" y1="153" x2="254" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="235" y1="139" x2="238" y2="139" stroke="#e67e22" stroke-width="1.5" marker-end="url(#sqo)"/>
  <line x1="270" y1="139" x2="273" y2="139" stroke="#e67e22" stroke-width="1.5" marker-end="url(#sqo)"/>
  <text x="250" y="235" text-anchor="middle" font-size="9" fill="#555">Sentiment Analysis</text>

  <!-- One-to-Many -->
  <text x="420" y="55" text-anchor="middle" font-size="11" font-weight="bold" fill="#d35400">One to Many</text>
  <text x="420" y="68" text-anchor="middle" font-size="9"  fill="#d35400">(Vec to Seq)</text>
  <rect x="405" y="80" width="28" height="28" rx="5" fill="#3498db"/><text x="419" y="99" text-anchor="middle" font-size="10" fill="white">X</text>
  <rect x="370" y="125" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="405" y="125" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="440" y="125" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="370" y="170" width="28" height="28" rx="5" fill="#2ecc71"/><text x="384" y="189" text-anchor="middle" font-size="10" fill="white">Y1</text>
  <rect x="405" y="170" width="28" height="28" rx="5" fill="#2ecc71"/><text x="419" y="189" text-anchor="middle" font-size="10" fill="white">Y2</text>
  <rect x="440" y="170" width="28" height="28" rx="5" fill="#2ecc71"/><text x="454" y="189" text-anchor="middle" font-size="10" fill="white">Y3</text>
  <line x1="419" y1="108" x2="384" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="419" y1="108" x2="419" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="419" y1="108" x2="454" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="370" y1="153" x2="370" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="405" y1="153" x2="405" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="440" y1="153" x2="440" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="400" y1="139" x2="403" y2="139" stroke="#e67e22" stroke-width="1.5" marker-end="url(#sqo)"/>
  <line x1="435" y1="139" x2="438" y2="139" stroke="#e67e22" stroke-width="1.5" marker-end="url(#sqo)"/>
  <text x="420" y="235" text-anchor="middle" font-size="9" fill="#555">Image Captioning</text>

  <!-- Seq-Seq Aligned -->
  <text x="610" y="55" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">Seq-Seq Aligned</text>
  <text x="610" y="68" text-anchor="middle" font-size="9"  fill="#c0392b">(POS Tagging)</text>
  <rect x="565" y="80"  width="28" height="28" rx="5" fill="#3498db"/><text x="579" y="99"  text-anchor="middle" font-size="10" fill="white">X1</text>
  <rect x="600" y="80"  width="28" height="28" rx="5" fill="#3498db"/><text x="614" y="99"  text-anchor="middle" font-size="10" fill="white">X2</text>
  <rect x="635" y="80"  width="28" height="28" rx="5" fill="#3498db"/><text x="649" y="99"  text-anchor="middle" font-size="10" fill="white">X3</text>
  <rect x="565" y="125" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="600" y="125" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="635" y="125" width="28" height="28" rx="5" fill="#e74c3c"/>
  <rect x="565" y="170" width="28" height="28" rx="5" fill="#2ecc71"/><text x="579" y="189" text-anchor="middle" font-size="10" fill="white">Y1</text>
  <rect x="600" y="170" width="28" height="28" rx="5" fill="#2ecc71"/><text x="614" y="189" text-anchor="middle" font-size="10" fill="white">Y2</text>
  <rect x="635" y="170" width="28" height="28" rx="5" fill="#2ecc71"/><text x="649" y="189" text-anchor="middle" font-size="10" fill="white">Y3</text>
  <line x1="565" y1="108" x2="565" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="600" y1="108" x2="600" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="635" y1="108" x2="635" y2="123" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="565" y1="153" x2="565" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="600" y1="153" x2="600" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="635" y1="153" x2="635" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#sq)"/>
  <line x1="595" y1="139" x2="598" y2="139" stroke="#e67e22" stroke-width="1.5" marker-end="url(#sqo)"/>
  <line x1="630" y1="139" x2="633" y2="139" stroke="#e67e22" stroke-width="1.5" marker-end="url(#sqo)"/>
  <text x="610" y="235" text-anchor="middle" font-size="9" fill="#555">POS Tagging / NER</text>

  <line x1="175" y1="45" x2="175" y2="220" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <line x1="340" y1="45" x2="340" y2="220" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <line x1="510" y1="45" x2="510" y2="220" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>

  <defs>
    <marker id="sq"  markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="sqo" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#e67e22"/>
    </marker>
  </defs>
</svg>
