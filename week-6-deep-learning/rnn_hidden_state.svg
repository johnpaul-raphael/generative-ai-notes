<svg width="700" height="280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="280" fill="#f0f4f8" rx="10"/>
  <text x="350" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">RNN Hidden State — Memory of Past Inputs</text>

  <text x="120" y="60" text-anchor="middle" font-size="12" fill="#7f8c8d">t = 1</text>
  <text x="290" y="60" text-anchor="middle" font-size="12" fill="#7f8c8d">t = 2</text>
  <text x="460" y="60" text-anchor="middle" font-size="12" fill="#7f8c8d">t = 3</text>
  <text x="600" y="60" text-anchor="middle" font-size="12" fill="#7f8c8d">t = n</text>

  <rect x="90"  y="75" width="60" height="40" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="120" y="100" text-anchor="middle" font-size="13" fill="white">X1</text>
  <rect x="260" y="75" width="60" height="40" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="290" y="100" text-anchor="middle" font-size="13" fill="white">X2</text>
  <rect x="430" y="75" width="60" height="40" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="460" y="100" text-anchor="middle" font-size="13" fill="white">X3</text>
  <rect x="570" y="75" width="60" height="40" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="600" y="100" text-anchor="middle" font-size="13" fill="white">Xn</text>

  <line x1="120" y1="115" x2="120" y2="143" stroke="#555" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="290" y1="115" x2="290" y2="143" stroke="#555" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="460" y1="115" x2="460" y2="143" stroke="#555" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="600" y1="115" x2="600" y2="143" stroke="#555" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="90"  y="148" width="60" height="40" rx="8" fill="#c0392b" stroke="#922b21" stroke-width="2"/>
  <text x="120" y="173" text-anchor="middle" font-size="11" fill="white">H1</text>
  <rect x="260" y="148" width="60" height="40" rx="8" fill="#a93226" stroke="#922b21" stroke-width="2"/>
  <text x="290" y="173" text-anchor="middle" font-size="11" fill="white">H2</text>
  <rect x="430" y="148" width="60" height="40" rx="8" fill="#922b21" stroke="#7b241c" stroke-width="2"/>
  <text x="460" y="173" text-anchor="middle" font-size="11" fill="white">H3</text>
  <rect x="570" y="148" width="60" height="40" rx="8" fill="#7b241c" stroke="#641e16" stroke-width="2"/>
  <text x="600" y="173" text-anchor="middle" font-size="11" fill="white">Hn</text>

  <line x1="152" y1="168" x2="258" y2="168" stroke="#e67e22" stroke-width="2.5" marker-end="url(#a3)"/>
  <line x1="322" y1="168" x2="428" y2="168" stroke="#e67e22" stroke-width="2.5" marker-end="url(#a3)"/>
  <line x1="492" y1="168" x2="568" y2="168" stroke="#e67e22" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#a3)"/>

  <text x="205" y="160" text-anchor="middle" font-size="9" fill="#e67e22">carries H1</text>
  <text x="375" y="160" text-anchor="middle" font-size="9" fill="#e67e22">carries H1+H2</text>

  <line x1="120" y1="188" x2="120" y2="218" stroke="#555" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="290" y1="188" x2="290" y2="218" stroke="#555" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="460" y1="188" x2="460" y2="218" stroke="#555" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="600" y1="188" x2="600" y2="218" stroke="#555" stroke-width="2" marker-end="url(#a2)"/>

  <rect x="90"  y="222" width="60" height="35" rx="8" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="120" y="244" text-anchor="middle" font-size="12" fill="white">Y1</text>
  <rect x="260" y="222" width="60" height="35" rx="8" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="290" y="244" text-anchor="middle" font-size="12" fill="white">Y2</text>
  <rect x="430" y="222" width="60" height="35" rx="8" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="460" y="244" text-anchor="middle" font-size="12" fill="white">Y3</text>
  <rect x="570" y="222" width="60" height="35" rx="8" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="600" y="244" text-anchor="middle" font-size="12" fill="white">Yn</text>

  <defs>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e67e22"/>
    </marker>
  </defs>
</svg>
