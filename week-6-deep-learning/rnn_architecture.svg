<svg width="700" height="300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="300" fill="#f8f9fa" rx="10"/>
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">RNN Basic Architecture (Unrolled)</text>

  <text x="100" y="70" text-anchor="middle" font-size="12" fill="#7f8c8d">t-1</text>
  <text x="300" y="70" text-anchor="middle" font-size="12" fill="#7f8c8d">t</text>
  <text x="500" y="70" text-anchor="middle" font-size="12" fill="#7f8c8d">t+1</text>

  <circle cx="100" cy="220" r="25" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="100" y="225" text-anchor="middle" font-size="13" fill="white">Xt-1</text>
  <circle cx="300" cy="220" r="25" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="300" y="225" text-anchor="middle" font-size="13" fill="white">Xt</text>
  <circle cx="500" cy="220" r="25" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="500" y="225" text-anchor="middle" font-size="13" fill="white">Xt+1</text>

  <rect x="70" y="110" width="60" height="40" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="100" y="135" text-anchor="middle" font-size="12" fill="white">Ht-1</text>
  <rect x="270" y="110" width="60" height="40" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="300" y="135" text-anchor="middle" font-size="12" fill="white">Ht</text>
  <rect x="470" y="110" width="60" height="40" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="500" y="135" text-anchor="middle" font-size="12" fill="white">Ht+1</text>

  <circle cx="100" cy="80" r="20" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="100" y="85" text-anchor="middle" font-size="12" fill="white">Yt-1</text>
  <circle cx="300" cy="80" r="20" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="300" y="85" text-anchor="middle" font-size="13" fill="white">Yt</text>
  <circle cx="500" cy="80" r="20" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="500" y="85" text-anchor="middle" font-size="12" fill="white">Yt+1</text>

  <line x1="100" y1="195" x2="100" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="300" y1="195" x2="300" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="195" x2="500" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <line x1="100" y1="110" x2="100" y2="103" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="300" y1="110" x2="300" y2="103" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="110" x2="500" y2="103" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <line x1="132" y1="130" x2="268" y2="130" stroke="#e67e22" stroke-width="2.5" marker-end="url(#arrO)"/>
  <line x1="332" y1="130" x2="468" y2="130" stroke="#e67e22" stroke-width="2.5" marker-end="url(#arrO)"/>
  <text x="200" y="123" text-anchor="middle" font-size="10" fill="#e67e22">W_hh</text>
  <text x="400" y="123" text-anchor="middle" font-size="10" fill="#e67e22">W_hh</text>

  <text x="620" y="135" font-size="20" fill="#aaa">...</text>
  <text x="10"  y="135" font-size="20" fill="#aaa">...</text>

  <rect x="30"  y="258" width="14" height="14" fill="#3498db"/>
  <text x="50"  y="270" font-size="11" fill="#555">Input</text>
  <rect x="110" y="258" width="14" height="14" fill="#e74c3c"/>
  <text x="130" y="270" font-size="11" fill="#555">Hidden State</text>
  <rect x="230" y="258" width="14" height="14" fill="#2ecc71"/>
  <text x="250" y="270" font-size="11" fill="#555">Output</text>
  <line x1="330" y1="265" x2="360" y2="265" stroke="#e67e22" stroke-width="2"/>
  <text x="368" y="270" font-size="11" fill="#555">Recurrent Weight (W_hh)</text>

  <defs>
    <marker id="arr"  markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
    <marker id="arrO" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e67e22"/>
    </marker>
  </defs>
</svg>
